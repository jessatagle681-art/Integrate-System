{% extends 'base.html' %} {% block title %}Notifications | Integrated Portal{%
endblock %} {% block content %}
<div class="container" style="max-width: 900px; margin: 32px auto">

  <ul>
    {% for n in notifications %}

    {% endfor %}
  </ul>
  {% else %}
  <p>No notifications.</p>
  {% endif %}
</div>
{% endblock %}
